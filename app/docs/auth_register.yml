tags:
  - Autenticação
summary: "Cria uma nova conta de usuário"
parameters:
  - in: body
    name: body
    required: true
    description: "Dados necessários para o registro"
    schema:
      type: object
      required: [username, email, password]
      properties:
        username: {type: string, example: "leandro_coelho"}
        email: {type: string, example: "leandro@exemplo.com"}
        password: {type: string, example: "senha123"}
responses:
  201:
    description: "Usuário criado com sucesso"
  400:
    description: "Erro de validação (Ex: campos vazios, e-mail já cadastrado ou username em uso)"